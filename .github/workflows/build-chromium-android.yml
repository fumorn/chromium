
name: Build Chromium for Android

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'chrome_public_apk'
        type: choice
        options:
          - chrome_public_apk
          - content_shell_apk
          - webview_instrumentation_apk
      branch:
        description: 'Chromium branch/tag'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Maximize build space
      run: |
        echo "=== Initial disk space ==="
        df -h
        
        echo "=== Cleaning package manager ==="
        sudo apt clean
        sudo apt autoremove -y
        
        echo "=== Removing large pre-installed tools ==="
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/lib/jvm
        
        echo "=== Cleaning docker images ==="
        docker system prune -a -f
        
        echo "=== Final disk space ==="
        df -h
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          curl \
          git \
          python3 \
          python3-pip \
          pkg-config \
          ninja-build \
          xz-utils \
          bzip2 \
          patchelf \
          default-jdk-headless \
          libtinfo5 \
          libc6-dev-i386 \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxss-dev \
          libxtst-dev \
          libpango1.0-dev \
          libnss3-dev \
          libgconf-2-4 \
          libatk-bridge2.0-0 \
          libgtk-3-0 \
          libgbm-dev
          
    - name: Install depot_tools with retry
      run: |
        for i in {1..3}; do
          echo "Attempt $i: Cloning depot_tools..."
          if [ -d "depot_tools" ]; then
            rm -rf depot_tools
          fi
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git && break
          echo "Attempt $i failed. Sleeping for 30 seconds..."
          sleep 30
        done
        
        echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
        export PATH="${{ github.workspace }}/depot_tools:${PATH}"
        echo "DEPOT_TOOLS_PATH=${{ github.workspace }}/depot_tools" >> $GITHUB_ENV
        
    - name: Configure Git with optimized settings
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Optimize for large repositories
        git config --global core.compression 0
        git config --global http.postBuffer 1048576000
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        git config --global http.version HTTP/1.1
        
        # Enable verbose output for debugging
        git config --global transfer.verbose true
        
        echo "Git configured with optimized settings"
        
    - name: Create Chromium build directory
      run: |
        # Clean any existing build directory to save space
        rm -rf chromium-build
        mkdir -p chromium-build
      
    - name: Fetch Chromium code (with comprehensive retry)
      working-directory: chromium-build
      run: |
        # Retry function
        retry() {
          local n=1
          local max=3
          local delay=60
          while true; do
            "$@" && break || {
              if [[ $n -lt $max ]]; then
                echo "Command failed. Attempt $n/$max. Sleeping $delay seconds..."
                sleep $delay
                ((n++))
              else
                echo "Command failed after $n attempts."
                return 1
              fi
            }
          done
        }
        
        # Run fetch with retry
        echo "=== Fetching Chromium code ==="
        retry fetch --nohooks android
        
        # Run gclient sync with retry and verbose output
        echo "=== Running gclient sync ==="
        retry gclient sync --with_branch_heads --with_tags --verbose
        
        echo "=== Sync completed ==="
        
    - name: Checkout specific branch/tag
      working-directory: chromium-build/src
      run: |
        git fetch --tags --verbose
        git checkout ${{ github.event.inputs.branch }}
        
    - name: Clean up temporary git files to save space
      working-directory: chromium-build/src
      run: |
        # Remove git objects that are not needed
        git gc --aggressive --prune=now
        rm -rf .git/refs/original
        git reflog expire --expire=now --all
        
    - name: Install additional build dependencies
      working-directory: chromium-build/src
      run: |
        ./build/install-build-deps.sh --android
        
    - name: Run hooks
      working-directory: chromium-build/src
      run: gclient runhooks
        
    - name: Set up Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        
        # Download with retry
        for i in {1..3}; do
          echo "Attempt $i: Downloading Android SDK..."
          wget -q --timeout=60 --tries=3 https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip && break
          echo "Attempt $i failed. Sleeping for 30 seconds..."
          sleep 30
        done
        
        unzip -q commandlinetools-linux-9477386_latest.zip
        rm commandlinetools-linux-9477386_latest.zip  # Save space
        
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Accept licenses with retry
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
    - name: Create output directory
      working-directory: chromium-build/src
      run: mkdir -p out/Default
        
    - name: Generate build configuration
      working-directory: chromium-build/src
      run: |
        gn gen out/Default --args='target_os="android" target_cpu="arm64" is_debug=false symbol_level=0 enable_nacl=false blink_symbol_level=0 v8_symbol_level=0 treat_warnings_as_errors=false'
        gn args out/Default --list
        
    - name: Build Chromium
      working-directory: chromium-build/src
      run: |
        autoninja -C out/Default ${{ github.event.inputs.target }}
        
    - name: List build outputs
      working-directory: chromium-build/src
      run: |
        echo "Build artifacts:"
        find out/Default -name "*.apk" -o -name "*.aab" | sort
        
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chromium-android-${{ github.event.inputs.target }}
        path: |
          chromium-build/src/out/Default/apks/**/*.apk
          chromium-build/src/out/Default/*.apk
          chromium-build/src/out/Default/*.aab
        retention-days: 30
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          chromium-build/src/out/Default/build.ninja.log
          chromium-build/src/out/Default/build_log_*.txt
        retention-days: 7
